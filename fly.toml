# fly.toml app configuration file generated for glance-mplhua on 2025-05-11T12:47:00Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'glance-mplhua'
primary_region = 'gru'

[deploy]
  release_command = "/app/glance"

[mounts]
  source = "glance"
  destination = "/app/config"

[build]

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
